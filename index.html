<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Float Study Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>Study Timer</h1>
        
        <div class="settings">
            <div class="input-group">
                <label>Study (mins):</label>
                <input type="number" id="studyInput" value="25" min="1">
            </div>
            <div class="input-group">
                <label>Break (mins):</label>
                <input type="number" id="breakInput" value="5" min="1">
            </div>
        </div>

        <!-- The timer display that will move to the floating window -->
        <div id="pipContent" class="timer-display">
            <h2 id="status">Ready?</h2>
            <div id="countdown">25:00</div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-primary">Start Timer</button>
            <button id="resetBtn" class="btn-danger">Reset</button>
            <button id="manualPipBtn" class="btn-secondary">Float Now</button>
            
            <div class="toggle-group">
                <input type="checkbox" id="autoPipToggle" checked>
                <label for="autoPipToggle">Auto-float on tab switch</label>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
