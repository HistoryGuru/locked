<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Study Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>Study Timer</h1>
        
        <div class="settings">
            <div class="input-group">
                <label>Study (mins):</label>
                <input type="number" id="studyInput" value="25">
            </div>
            <div class="input-group">
                <label>Break (mins):</label>
                <input type="number" id="breakInput" value="5">
            </div>
        </div>

        <!-- This is the part that will float -->
        <div id="pipContent" class="timer-display">
            <h2 id="status">Ready?</h2>
            <div id="countdown">25:00</div>
        </div>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="resetBtn">Reset</button>
            <button id="pipBtn">Floating Mode</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
